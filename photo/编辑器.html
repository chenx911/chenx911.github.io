<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0ebe3;font-family:"Microsoft YaHei",sans-serif;display:flex;height:100vh;overflow:hidden}
/* 左侧：文件树 */
.sidebar{width:200px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}
.sidebar h3{padding:12px;font-size:.78em;color:#888;letter-spacing:2px;border-bottom:1px solid #eee;flex-shrink:0}
.sidebar button.open-btn{margin:10px;padding:7px;background:#369;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:.75em;flex-shrink:0}
.sidebar .tree{flex:1;overflow-y:auto;padding:4px;font-size:.73em}
.tree .item{padding:3px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;border-radius:3px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree .item:hover{background:#f0f4f8}
.tree .item.active{background:#e8f0f8;color:#369;font-weight:bold}
.tree .item.dir{color:#369}
/* 中间：编辑面板 */
.panel{width:280px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}
.panel h3{padding:12px;font-size:.78em;color:#888;letter-spacing:2px;border-bottom:1px solid #eee;flex-shrink:0}
.panel .opts{flex:1;overflow-y:auto;padding:12px}
.panel label{display:block;font-size:.72em;color:#888;margin:10px 0 2px}
.panel input,.panel select,.panel textarea{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:.75em;font-family:inherit;margin-bottom:4px}
.panel textarea{min-height:60px;resize:vertical}
.panel button{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-size:.75em;margin:4px 2px}
.panel .btn-insert{background:#369;color:#fff}
.panel .btn-save{background:#4caf50;color:#fff;width:100%;margin-top:8px}
.panel .btn-export{background:#fff;border:1px solid #ddd;width:100%;margin-top:4px}
.panel .hint{font-size:.68em;color:#aaa;margin:4px 0;line-height:1.4}
.panel .color-row{display:flex;align-items:center;gap:6px}
.panel .color-row input[type=color]{width:30px;height:30px;padding:0;border:none;cursor:pointer}
.panel .color-row input[type=text]{flex:1}
/* 右侧：代码编辑 */
.code{flex:1;display:flex;flex-direction:column;background:#1e1e1e}
.code .bar{background:#333;padding:6px 12px;display:flex;align-items:center;gap:8px}
.code .bar span{font-size:.72em;color:#aaa}
.code textarea{flex:1;padding:14px;border:none;font-family:"Consolas","Courier New",monospace;font-size:.78em;line-height:1.6;resize:none;outline:none;background:#1e1e1e;color:#d4d4d4;tab-size:2}
.msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;background:#333;color:#fff;border-radius:20px;font-size:.78em;opacity:0;transition:opacity .3s;z-index:99}
.msg.show{opacity:1}
</style>
</head>
<body>

<div class="sidebar">
  <h3>📁 文件</h3>
  <button class="open-btn" onclick="openFolder()">📂 选择并打开文件夹</button>
  <div class="tree" id="fileTree"><p style="font-size:.7em;color:#aaa;text-align:center;padding:8px">初次进入，点击上方按钮<br>打开 photo 文件夹</p></div>
</div>

<div class="panel">
  <h3>⚙️ 编辑选项</h3>
  <div class="opts" id="editOpts">
    <p style="font-size:.73em;color:#aaa;text-align:center;padding:12px">点击左侧文件开始编辑</p>
  </div>
</div>

<div class="code">
  <div class="bar">
    <span id="codeLabel">代码</span>
    <span style="flex:1"></span>
    <button onclick="saveFile()" style="padding:4px 12px;background:#4caf50;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:.72em">💾 保存</button>
  </div>
  <textarea id="codeEditor" oninput="updateCode()" spellcheck="false"></textarea>
</div>
<div class="msg" id="msg"></div>

<script>
let dirHandle=null,curFile=null,curPath='',curType='';

function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2500)}

// === 打开文件夹 ===
async function openFolder(){try{dirHandle=await window.showDirectoryPicker();await refreshTree();showMsg('✅ 已打开文件夹')}catch(e){if(e.name!=='AbortError')showMsg('需要Chrome/Edge浏览器')}}

async function refreshTree(){
  const t=document.getElementById('fileTree');t.innerHTML='';
  await scanDir(t,dirHandle,'');
}
async function scanDir(container,handle,path){
  const e=[];for await(const[n,h]of handle.entries())e.push({n,handle:h,kind:h.kind});
  e.sort((a,b)=>a.kind===b.kind?a.n.localeCompare(b.n):a.kind==='directory'?-1:1);
  for(const x of e){
    if(x.kind==='directory'){
      const d=document.createElement('div');d.className='item dir';
      d.innerHTML=`📁 ${x.n}`;
      const sub=document.createElement('div');sub.style.paddingLeft='12px';sub.style.display='none';
      d.onclick=()=>{sub.style.display=sub.style.display==='none'?'block':'none'};
      container.appendChild(d);container.appendChild(sub);
      await scanDir(sub,x.handle,path+x.n+'/');
    }else{
      const d=document.createElement('div');d.className='item';
      const ext=x.n.split('.').pop();
      const icons={html:'📄',css:'🎨',jpg:'🖼',png:'🖼',gif:'🖼'};
      d.innerHTML=`${icons[ext]||'📎'} ${x.n}`;
      d.onclick=async()=>{
        document.querySelectorAll('.tree .item').forEach(el=>el.classList.remove('active'));
        d.classList.add('active');
        await openFile(x.handle,x.n,path);
      };
      container.appendChild(d);
    }
  }
}

// === 打开文件 ===
async function openFile(handle,name,path){
  const f=await handle.getFile();const t=await f.text();
  curFile=handle;curPath=path+name;curType=name.endsWith('.css')?'css':'html';
  document.getElementById('codeEditor').value=t;
  document.getElementById('codeLabel').textContent='📄 '+name;
  renderEditOpts(curType);
}

// === 编辑选项面板 ===
function renderEditOpts(type){
  const el=document.getElementById('editOpts');
  if(type==='html'){
    el.innerHTML=`
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">🖼 有链接图片卡片（点击进子页）</b>
        <label>图片路径</label><input type="text" id="optImgSrc" value="picture1/picture/img.jpg">
        <label>图片名称（≤10字）</label><input type="text" id="optImgName" value="照片名" maxlength="10">
        <label>链接目标</label><input type="text" id="optImgLink" value="picture1/picture.html">
        <button class="btn-insert" onclick="insertCard()">＋ 插入卡片</button>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">📷 无链接图片（精选展示）</b>
        <label>图片路径</label><input type="text" id="optFeatSrc" value="photos/img.jpg">
        <label>文字描述</label><input type="text" id="optFeatText" value="描述">
        <button class="btn-insert" onclick="insertFeatured()">＋ 插入精选</button>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">📝 其他编辑</b>
        <label>在代码编辑器中直接粘贴图片路径，文字在代码中直接输入</label>
        <div class="hint">在代码编辑器中直接修改HTML</div>
      </div>`;
  }else{
    el.innerHTML=`
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">🎨 网页背景</b>
        <div class="color-row"><input type="color" id="cssBg" value="#D0D0D0" onchange="updateCSSColor()"><input type="text" id="cssBgTxt" value="#D0D0D0" onchange="syncColor('bg')"></div>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">📦 内容区背景</b>
        <div class="color-row"><input type="color" id="cssWrap" value="#FFFFFF" onchange="updateCSSColor()"><input type="text" id="cssWrapTxt" value="#FFFFFF" onchange="syncColor('wrap')"></div>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">📝 文字颜色</b>
        <div class="color-row"><input type="color" id="cssText" value="#333333" onchange="updateCSSColor()"><input type="text" id="cssTextTxt" value="#333333" onchange="syncColor('text')"></div>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">🔗 链接颜色</b>
        <div class="color-row"><input type="color" id="cssLink" value="#336699" onchange="updateCSSColor()"><input type="text" id="cssLinkTxt" value="#336699" onchange="syncColor('link')"></div>
      </div>
      <div style="margin-bottom:12px">
        <b style="font-size:.75em;color:#666">🔗 链接hover颜色</b>
        <div class="color-row"><input type="color" id="cssHover" value="#224466" onchange="updateCSSColor()"><input type="text" id="cssHoverTxt" value="#224466" onchange="syncColor('hover')"></div>
      </div>
      <div class="hint">选择颜色后，代码中的色值会自动替换。也可在右侧代码编辑器中直接修改。</div>`;
  }
}

// === HTML 插入 ===
function insertCard(){
  const src=document.getElementById('optImgSrc').value||'img.jpg';
  const name=document.getElementById('optImgName').value||'照片';
  const link=document.getElementById('optImgLink').value||'#';
  const code=`<a href="${link}" class="gallery-card">\n  <img src="${src}" alt="">\n  <p>${name}</p>\n</a>`;
  const ed=document.getElementById('codeEditor');
  const pos=ed.selectionStart||ed.value.length;
  ed.value=ed.value.substring(0,pos)+'\n'+code+'\n'+ed.value.substring(pos);
  showMsg('✅ 卡片已插入');
}
function insertFeatured(){
  const src=document.getElementById('optFeatSrc').value||'img.jpg';
  const text=document.getElementById('optFeatText').value||'描述';
  const code=`<div class="featured-card">\n  <img src="${src}" alt="">\n  <p>${text}</p>\n</div>`;
  const ed=document.getElementById('codeEditor');
  const pos=ed.selectionStart||ed.value.length;
  ed.value=ed.value.substring(0,pos)+'\n'+code+'\n'+ed.value.substring(pos);
  showMsg('✅ 精选卡片已插入');
}

// === CSS颜色 ===
function updateCSSColor(){
  const colors={bg:{id:'cssBg',prop:'body{background:'},wrap:{id:'cssWrap',prop:'background:#'},text:{id:'cssText',prop:'color:#'},link:{id:'cssLink',prop:'a{color:#'},hover:{id:'cssHover',prop:'a:hover{text-decoration:underline;color:#'}};
  for(const[k,v]of Object.entries(colors)){
    const el=document.getElementById(v.id);if(!el)continue;
    const hex=el.value;document.getElementById(v.id+'Txt').value=hex;
    const ed=document.getElementById('codeEditor');
    const rx=new RegExp(v.prop.replace(/[{}]/g,'\\$&')+'[0-9a-fA-F]{3,6}','i');
    ed.value=ed.value.replace(rx,v.prop+hex);
  }
}
function syncColor(which){
  const map={bg:'cssBg',wrap:'cssWrap',text:'cssText',link:'cssLink',hover:'cssHover'};
  const txt=document.getElementById(map[which]+'Txt').value;
  document.getElementById(map[which]).value=txt;
  updateCSSColor();
}

function updateCode(){/* 代码编辑器的内容在保存时生效 */}

// === 保存 ===
async function saveFile(){
  if(!curFile){showMsg('请先打开一个文件');return}
  const content=document.getElementById('codeEditor').value;
  try{const w=await curFile.createWritable();await w.write(content);await w.close();showMsg('✅ 已保存 '+curPath)}catch(e){showMsg('❌ 保存失败')}
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile()}});
</script>
</body>
</html>
